<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
        let inp = parseInt(prompt("Enter number 1:"));
        if(inp==1){
            document.write("0");
        }else if(inp==2){
            document.write("0,1");
        }else{
            document.write("0,1,")
            temp1 = 0;
            temp2 = 1;
            for(i=2;i<inp;i++){
                sum = temp1+temp2
                document.write(sum+",")
                temp1 = temp2
                temp2 = sum
            }
        }
    </script>
</body>
</html>
