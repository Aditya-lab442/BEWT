<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let inp = parseInt(prompt("Enter number 1:"));
        let temp = inp
        digit=0
        while(temp!=0){
            digit++;
            temp = Math.floor(temp/10)
        }
        temp = inp
        sum=0
        while(temp!=0){
            rem = temp%10;
            sum += Math.pow(rem,digit)
            temp = Math.floor(temp/10)
        }
        if(inp==sum){
            document.write("Armstrong..")
        }else{
            document.write("Not Armstrong..")
        }
    </script>
</body>
</html>
