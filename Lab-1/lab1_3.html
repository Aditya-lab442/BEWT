<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        inp1 = parseInt(prompt("Enter number 1:"));
        let total = 1;
        for(i=1;i<=inp1;i++){
            total*=i;
        }
        document.write("<h1>Factorial = "+total+"</h1>")
    </script>
</body>
</html>
