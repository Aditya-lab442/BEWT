<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        inp1 = parseInt(prompt("Enter number 1:"));
        inp2 = parseInt(prompt("Enter number 2:"));
        op = prompt("Enter Operator:");
        if(op=='+'){
            document.write("Answer:",inp1+inp2)
        }
        if(op=='-'){
            document.write("Answer:",inp1-inp2)
        }
        if(op=='*'){
            document.write("Answer:",inp1*inp2)
        }
        if(op=='/'){
            document.write("Answer:",inp1/inp2)
        }
    </script>
</body>
</html>
