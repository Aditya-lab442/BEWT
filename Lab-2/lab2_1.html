<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        inp1 = parseInt(prompt("Enter number 1:"));
        inp2 = parseInt(prompt("Enter number 2:"));
        function calculate(c,d,call){
            answer = c+d;
            call(answer)
        }
        function print(ans){
            document.write("<h1>"+ans+"</h1>")
        }
        calculate(inp1,inp2,print)
    </script>
</body>
</html>
